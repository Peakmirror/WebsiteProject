{% extends "base.html" %}
{% block title %}Forgot Password — BookIt{% endblock %}

{% block content %}
<div class="card form-card">
    <h1>Forgot Password</h1>
    <!-- Form where users request a reset link -->
    <form method="POST">
        <div class="form-group">
            <label for="email">Your Email Address</label>
            <input type="email" id="email" name="email" required autofocus />
            <p class="form-hint">We'll send a reset link if that email is registered with us.</p>
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2">Send Reset Link</button>
    </form>
    <!-- Quick way back to the login page -->
    <p class="text-center text-muted mt-2">
        <a href="{{ url_for('login') }}" style="color: var(--primary);">Back to login</a>
    </p>
</div>
{% endblock %}
