{% extends "base.html" %}
{% block title %}Log In — BookIt{% endblock %}

{% block content %}
<div class="card form-card">
    <h1>Welcome back</h1>
    <!-- Login form for existing users -->
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus autocomplete="username" />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2">Log In</button>
    </form>
    <!-- Helpful links below the form -->
    <p class="text-center text-muted mt-2">
        <a href="{{ url_for('forgot_password') }}" style="color: var(--primary);">Forgot your password?</a>
    </p>
    <p class="text-center text-muted mt-1">
        No account yet? <a href="{{ url_for('register') }}" style="color: var(--primary);">Sign up</a>
    </p>
</div>
{% endblock %}
